experiment:
  name: stgnn_anomaly
  seed: 42
  output_dir: outputs

data:
  mode: synthetic  # options: synthetic, sumo
  sim:
    timesteps: 288        # e.g., 24h at 5-min intervals
    num_nodes: 40
    feature_dim: 4        # speed, flow, density, queue
    incident_rate: 0.02   # fraction of timesteps with injected incidents
  sumo:
    net_file: data/raw/network.net.xml
    route_file: data/raw/routes.rou.xml
    step_length: 1.0
  window:
    history: 12           # input sequence length
    horizon: 3            # forecasting steps
    train_split: 0.7
    val_split: 0.15

model:
  hidden_dim: 64
  gnn_layers: 2
  gat_heads: 2
  dropout: 0.1
  use_graph: true        # ablation: if false, skip graph conv and use MLP
  temporal:
    type: gru            # options: gru, transformer
    n_heads: 2           # used when type=transformer
    ff_mult: 2           # transformer feedforward width multiplier
    num_layers: 1

training:
  batch_size: 16
  max_epochs: 20
  learning_rate: 1.5e-3
  weight_decay: 1e-4
  grad_clip: 1.0
  device: auto
  input_mask_ratio: 0.1  # masked reconstruction rate

thresholding:
  method: quantile
  quantile: 0.98
  smooth_window: 3

dashboard:
  refresh_seconds: 5

